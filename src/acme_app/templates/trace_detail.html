<!doctype html>
<html><head><meta charset='utf-8'/><title>Trace {{ trace_ref }}</title><link rel='stylesheet' href='/static/app.css'/></head>
<body>
<h1>Trace {{ trace_ref }}</h1>
<div class='trace-grid'>
  <section>
    <h2>Evidence-to-Action Decision Graph</h2>
    <svg viewBox='0 0 800 1200' width='100%' height='600'>
      <rect x='40' y='30' width='300' height='40' class='node'/><text x='55' y='55'>User Query</text>
      <line x1='190' y1='70' x2='190' y2='130' class='edge'/>

      <line x1='190' y1='170' x2='190' y2='230' class='edge'/>

      <line x1='190' y1='270' x2='190' y2='330' class='edge'/>
      <rect x='40' y='330' width='300' height='40' class='node'/><text x='55' y='355'>Tools and Skills</text>
      <line x1='190' y1='370' x2='190' y2='430' class='edge'/>
      <rect x='40' y='430' width='300' height='40' class='node'/><text x='55' y='455'>RBAC Decision</text>
      <line x1='190' y1='470' x2='190' y2='530' class='edge'/>
      <rect x='40' y='530' width='300' height='40' class='node'/><text x='55' y='555'>Final Outcome</text>
    </svg>
  </section>
  <section>
    <h2>Events</h2>
    <pre>{{ events }}</pre>
  </section>
</div>
</body></html>
