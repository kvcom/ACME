services:
  app:
    build: .
    working_dir: /app
    volumes:
      - ./:/app
    command: uvicorn acme_app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    ports:
      - "8000:8000"
    extra_hosts:
      # Lets the container reach the host's Ollama on http://host.docker.internal:11434
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mcp-server:
        condition: service_started

  postgres:
    build: ./infra/postgres
    environment:
      POSTGRES_DB: acme
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: acme
    ports:
      - "5432:5432"
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infra/postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acme -d acme"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: valkey/valkey:8.1-alpine
    ports:
      - "6380:6379"
    expose:
      - "6379"

  keycloak:
    build: ./infra/keycloak
    command: ["start", "--optimized", "--http-enabled=true", "--hostname-strict=false", "--http-host=0.0.0.0", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/acme-realm.json:/opt/keycloak/data/import/acme-realm.json:ro

  mcp-server:
    build: ./mcp_server
    working_dir: /app
    volumes:
      - ./mcp_server:/app
    env_file:
      - .env.example
    environment:
      SYNC_DATABASE_URL: postgresql://acme:acme@postgres:5432/acme
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/otel/collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318"
      - "4317:4317"
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/jaeger:2.18.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
