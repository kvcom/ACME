services:
  app:
    build: .
    working_dir: /app
    volumes:
      - ./:/app
    command: uvicorn acme_app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mcp-server:
        condition: service_started

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: acme
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: acme
    ports:
      - "5432:5432"
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infra/postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acme -d acme"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    expose:
      - "6379"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/acme-realm.json:/opt/keycloak/data/import/acme-realm.json:ro

  mcp-server:
    build: ./mcp_server
    working_dir: /app
    volumes:
      - ./mcp_server:/app
    env_file:
      - .env.example
    environment:
      SYNC_DATABASE_URL: postgresql://acme:acme@postgres:5432/acme
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.106.1
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/otel/collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318"
